services:
  - type: web
    name: joheundei
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHONUNBUFFERED
        value: "1"
      - key: PYTHONIOENCODING
        value: "utf-8"
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: GOOGLE_API_KEY
        sync: false
      - key: SAJU_AI_FREE_DAILY
        value: "6"
      - key: SAJU_AI_CACHE_TTL
        value: "86400"
      - key: ALLOWED_ORIGINS
        value: "https://joheundei.onrender.com"
